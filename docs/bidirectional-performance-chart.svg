<svg xmlns='http://www.w3.org/2000/svg' width='1480' height='960' viewBox='0 0 1480 960' role='img' aria-labelledby='title desc'>
  <title id='title'>Bidirectional performance improvement curve</title>
  <desc id='desc'>Chart showing dev-suite stitch median total falling from 27449 milliseconds at baseline to 305 milliseconds after the retained optimization passes.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0%' stop-color='#0f172a' />
      <stop offset='100%' stop-color='#111827' />
    </linearGradient>
    <linearGradient id='lineGradient' x1='0' y1='0' x2='1' y2='0'>
      <stop offset='0%' stop-color='#38bdf8' />
      <stop offset='100%' stop-color='#22c55e' />
    </linearGradient>
    <linearGradient id='barGradient' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0%' stop-color='#f59e0b' />
      <stop offset='100%' stop-color='#f97316' />
    </linearGradient>
  </defs>
  <style>
    .title { font: 700 34px Segoe UI, Arial, sans-serif; fill: #f8fafc; }
    .subtitle { font: 500 18px Segoe UI, Arial, sans-serif; fill: #cbd5e1; }
    .section { font: 700 20px Segoe UI, Arial, sans-serif; fill: #e2e8f0; }
    .grid { stroke: rgba(148, 163, 184, 0.28); stroke-width: 1; }
    .axis-label { font: 14px Segoe UI, Arial, sans-serif; fill: #94a3b8; }
    .line { fill: none; stroke: url(#lineGradient); stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .point { fill: #f8fafc; stroke: #38bdf8; stroke-width: 4; }
    .value-label { font: 700 13px Segoe UI, Arial, sans-serif; fill: #e2e8f0; }
    .bar { fill: url(#barGradient); opacity: 0.95; }
    .speed-label { font: 700 13px Segoe UI, Arial, sans-serif; fill: #fde68a; }
    .step-label { font: 600 15px Segoe UI, Arial, sans-serif; fill: #e2e8f0; }
    .commit-label { font: 12px Consolas, monospace; fill: #94a3b8; }
    .footer { font: 13px Segoe UI, Arial, sans-serif; fill: #94a3b8; }
